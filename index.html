<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crisgopía</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  background: linear-gradient(to right, #f5f7fa, #e4e8ff);
}

header {
  background: linear-gradient(135deg, #6C63FF, #4CAF50);
  color: white;
  padding: 30px;
  text-align: center;
}

nav {
  background: #222;
  padding: 12px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.products {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  background: #6C63FF;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.cart {
  position: fixed;
  right: 10px;
  top: 100px;
  background: white;
  padding: 15px;
  border-radius: 15px;
  width: 250px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}
</style>

</head>

<body>

<header>
  <h1>Crisgopía 🎁</h1>
  <p>Regalos personalizados con emoción</p>
</header>

<nav>
  <a href="#productos">Productos</a>
  <a href="#contacto">Contacto</a>
</nav>

<div class="container">

<h2>Productos</h2>

<div class="products">

<div class="card">
  <h3>Caja Cumpleaños 🎂</h3>
  <p>$30.000</p>
  <button onclick="addToCart('Caja Cumpleaños',30000)">Agregar</button>
</div>

<div class="card">
  <h3>Caja Amor ❤️</h3>
  <p>$35.000</p>
  <button onclick="addToCart('Caja Amor',35000)">Agregar</button>
</div>

<div class="card">
  <h3>Caja Sorpresa 🎁</h3>
  <p>$25.000</p>
  <button onclick="addToCart('Caja Sorpresa',25000)">Agregar</button>
</div>

</div>

</div>

<!-- CARRITO -->
<div class="cart">
  <h3>Carrito 🛒</h3>
  <ul id="cartList"></ul>
  <p>Total: $<span id="total">0</span></p>
  <button onclick="sendWhatsApp()">Pedir por WhatsApp</button>
</div>

<!-- CONTACTO -->
<div class="container" id="contacto">
  <h2>Contacto</h2>
  <p>Instagram: @crisgopia</p>
</div>

<footer>
  <p>© 2026 Crisgopía</p>
</footer>
<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cartList");
  let total = 0;
  list.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;

    let li = document.createElement("li");
    li.innerHTML = `
      ${item.name} - $${item.price} 
      <button onclick="removeFromCart(${index})">❌</button>
    `;
    list.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

function sendWhatsApp() {
  let message = "Hola Crisgopía, quiero pedir:%0A";

  cart.forEach(item => {
    message += "- " + item.name + " ($" + item.price + ")%0A";
  });

  message += "Total: $" + cart.reduce((sum, item) => sum + item.price, 0);

  window.open("https://wa.me/573XXXXXXXXX?text=" + message);
}
</script>
